<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Hello - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .success-msg { display: none; color: #059669; }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h2 style="margin:0;">🅿️ Park Hello</h2>
        <p style="color:#666; font-size:14px; margin-bottom: 20px;">Register Your Vehicle</p>
        
        <input type="text" id="ownerName" placeholder="Owner Full Name">
        <input type="text" id="carNum" placeholder="Vehicle Plate Number" style="text-transform:uppercase;">
        <input type="tel" id="phone" placeholder="WhatsApp Number">
        
        <button class="btn" id="submitBtn" onclick="sendData()">Register & Request QR</button>
    </div>

    <script>
        function sendData() {
            const name = document.getElementById('ownerName').value;
            const car = document.getElementById('carNum').value.trim().toUpperCase();
            const phone = document.getElementById('phone').value;

            if(!name || !car || !phone) return alert("Please fill all fields!");

            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            // اپنا Google Script URL یہاں ڈالیں
            const scriptURL = 'YOUR_GOOGLE_SCRIPT_WEB_APP_URL'; 

            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: new URLSearchParams({ 'name': name, 'car': car, 'phone': phone })
            })
            .then(() => {
                document.getElementById('mainCard').innerHTML = `
                    <div style="padding:10px;">
                        <h2 style="color:#059669;">✅ Registered!</h2>
                        <p>Thank you <b>${name}</b>. Your request for <b>${car}</b> has been received.</p>
                        <p style="font-size:14px;">Please complete your payment. Our team will send your QR Sticker on WhatsApp within 24 hours.</p>
                        <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
                        <p style="font-size:12px; color:#999;">Park Hello Security System</p>
                    </div>
                `;
            })
            .catch(err => {
                alert("Something went wrong. Please try again.");
                btn.disabled = false;
                btn.innerText = "Register & Request QR";
            });
        }
    </script>
</body>
</html>
