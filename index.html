<div class="container">
<h2>🚗 Park Hello</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="923XXXXXXXXX">
<select id="vehicle">
<option value="">Vehicle</option>
<option>Car</option>
<option>Bike</option>
</select>
<input id="city" placeholder="City">
<input id="address" placeholder="Full Address">

<button onclick="generateQR()">Generate QR</button>

<div id="qrBox"></div>

<button onclick="printQR()">🖨️ Print</button>
</div>

<script>
function generateQR(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let vehicle = document.getElementById("vehicle").value;
let city = document.getElementById("city").value;
let address = document.getElementById("address").value;

if(!name || !phone || !vehicle || !city || !address){
alert("Fill all fields!");
return;
}

// Save Order
let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push({name,phone,vehicle,city,address,date:new Date().toLocaleString()});
localStorage.setItem("orders", JSON.stringify(orders));

// Profile Link
let link = `profile.html?name=${name}&phone=${phone}&vehicle=${vehicle}`;

// Generate QR
document.getElementById("qrBox").innerHTML = "";
new QRCode(document.getElementById("qrBox"), link);
}

function printQR(){
window.print();
}
</script>

</body>

<script>
    async function processRegistration() {
        const btn = document.getElementById('submitBtn');
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxbuYcjVwk1hogCD00mwOAKlFtz-7QQV8xUyyXZT3dP6AOCQxtVQCo1OWhhyab_PVWo/exec';

        const data = {
            name: document.getElementById('name').value,
            car: document.getElementById('car').value.trim().toUpperCase(),
            phone: document.getElementById('phone').value,
            blood: document.getElementById('blood').value,
            rel1: document.getElementById('rel1').value,
            fam1: document.getElementById('fam1').value,
            m1: document.getElementById('m1').value,
            rel2: document.getElementById('rel2').value,
            fam2: document.getElementById('fam2').value,
            m2: document.getElementById('m2').value
        };

        if(!data.name || !data.car || !data.phone || !data.rel1 || !data.fam1) {
            alert("Please fill all basic and emergency details!");
            return;
        }

        btn.innerText = "Saving your data...";
        btn.disabled = true;

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: new URLSearchParams(data)
            });
            showPaymentSuccess(data.name, data.car);
        } catch (error) {
            alert("Something went wrong. Please try again.");
            btn.disabled = false;
            btn.innerText = "Register for Lifetime (Rs. 500)";
        }
    }
