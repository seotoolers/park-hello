<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Hello - Smart Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --emergency: #dc2626; --bg: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; display: flex; justify-content: center; }
        
        .form-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 100%; max-width: 480px; }
        .logo-area { text-align: center; margin-bottom: 25px; }
        .logo-area h2 { margin: 0; color: var(--primary); font-size: 28px; }
        .logo-area p { margin: 5px 0 0; font-size: 13px; color: #64748b; }

        .section-title { font-size: 11px; font-weight: bold; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 12px; font-family: inherit; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); }

        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }

        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { background: #1557b0; transform: translateY(-2px); }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* Success Message Styling */
        .success-box { text-align: center; }
        .payment-info { background: #fff9c4; padding: 20px; border-radius: 15px; border: 1px dashed #fbc02d; margin: 20px 0; text-align: left; }
        .whatsapp-btn { display: block; background: #25d366; color: white; text-decoration: none; padding: 14px; border-radius: 12px; font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>

<div class="form-card" id="formContainer">
    <div class="logo-area">
        <h2>🅿️ Park Hello</h2>
        <p>Emergency & Smart Parking Solution</p>
    </div>

    <div id="registrationForm">
        <span class="section-title">Owner & Vehicle Info</span>
        <input type="text" id="name" placeholder="Full Name" required>
        <div class="row">
            <input type="text" id="car" placeholder="Vehicle No (e.g. LEC-5627)" style="text-transform: uppercase;" required>
            <select id="blood">
                <option value="">Blood Group</option>
                <option value="A+">A+</option><option value="A-">A-</option>
                <option value="B+">B+</option><option value="B-">B-</option>
                <option value="AB+">AB+</option><option value="AB-">AB-</option>
                <option value="O+">O+</option><option value="O-">O-</option>
            </select>
        </div>
        <input type="tel" id="phone" placeholder="Your WhatsApp Number" required>

        <span class="section-title">Emergency Contact 1 (Family)</span>
        <div class="row">
            <select id="rel1">
                <option value="">Select Relation</option>
                <option value="Father">Father</option>
                <option value="Mother">Mother</option>
                <option value="Brother">Brother</option>
                <option value="Sister">Sister</option>
                <option value="Wife">Wife</option>
                <option value="Husband">Husband</option>
                <option value="Friend">Friend</option>
                <option value="Cousin">Cousin</option>
                <option value="Office">Office / Boss</option>
                <option value="School">School / College</option>
            </select>
            <select id="m1">
                <option value="tel">Phone Call</option>
                <option value="wa">WhatsApp</option>
            </select>
        </div>
        <input type="tel" id="fam1" placeholder="Contact Number 1">

        <span class="section-title">Emergency Contact 2 (Family)</span>
        <div class="row">
            <select id="rel2">
                <option value="">Select Relation</option>
                <option value="Father">Father</option>
                <option value="Mother">Mother</option>
                <option value="Brother">Brother</option>
                <option value="Sister">Sister</option>
                <option value="Wife">Wife</option>
                <option value="Husband">Husband</option>
                <option value="Friend">Friend</option>
                <option value="Cousin">Cousin</option>
                <option value="Office">Office / Boss</option>
                <option value="School">School / College</option>
            </select>
            <select id="m2">
                <option value="tel">Phone Call</option>
                <option value="wa">WhatsApp</option>
            </select>
        </div>
        <input type="tel" id="fam2" placeholder="Contact Number 2">

        <button class="btn-submit" id="submitBtn" onclick="processRegistration()">Register for Lifetime (Rs. 500)</button>
    </div>
</div>

<script>
    async function processRegistration() {
        const btn = document.getElementById('submitBtn');
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzCfBRCwz0ucFM56xOUyO5R_J-dtigaShZi5Rw3s4R4ZfldQ40qUIFKAJPLwpvTsaVM/exec';

        const data = {
            name: document.getElementById('name').value,
            car: document.getElementById('car').value.trim().toUpperCase(),
            phone: document.getElementById('phone').value,
            blood: document.getElementById('blood').value,
            rel1: document.getElementById('rel1').value,
            fam1: document.getElementById('fam1').value,
            m1: document.getElementById('m1').value,
            rel2: document.getElementById('rel2').value,
            fam2: document.getElementById('fam2').value,
            m2: document.getElementById('m2').value
        };

        if(!data.name || !data.car || !data.phone || !data.rel1 || !data.fam1) {
            alert("Please fill all basic and emergency details!");
            return;
        }

        btn.innerText = "Saving your data...";
        btn.disabled = true;

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: new URLSearchParams(data)
            });
            showPaymentSuccess(data.name, data.car);
        } catch (error) {
            alert("Something went wrong. Please try again.");
            btn.disabled = false;
            btn.innerText = "Register for Lifetime (Rs. 500)";
        }
    }

    function showPaymentSuccess(name, car) {
        document.getElementById('formContainer').innerHTML = `
            <div class="success-box">
                <div style="font-size: 50px;">✅</div>
                <h2 style="color: #059669; margin-top: 10px;">Request Received!</h2>
                <p>Hi <b>${name}</b>, we have received your details for vehicle <b>${car}</b>.</p>
                
                <div class="payment-info">
                    <h4 style="margin: 0 0 10px 0; color: #856404;">💳 Complete your Payment:</h4>
                    <p style="margin: 5px 0; font-size: 14px;"><b>JazzCash:</b> 03077921584</p>
                    <p style="margin: 5px 0; font-size: 14px;"><b>EasyPaisa:</b> 03222813027</p>
                    <p style="margin: 10px 0 0 0; font-size: 12px; color: #856404;"><i>Note: After payment, send a screenshot of the receipt.</i></p>
                </div>

                <a href="https://wa.me/923060157873?text=Hi, I have registered my car ${car} and paid Rs. 500." class="whatsapp-btn">
                    📲 Send Receipt Screenshot
                </a>
            </div>
        `;
    }
</script>

</body>
</html>
