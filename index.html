<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Hello - Emergency Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --success: #25d366; --bg: #f1f5f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 5px; }
        p { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; outline: none; font-family: inherit; }
        input:focus { border-color: var(--primary); }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        .btn-submit:hover { background: #1557b0; }
        .section-label { font-size: 12px; font-weight: bold; color: #1a73e8; margin-top: 10px; display: block; text-transform: uppercase; }
        .payment-box { background: #fff9c4; padding: 15px; border-radius: 12px; border: 1px solid #fbc02d; margin-top: 20px; }
        .whatsapp-btn { display: block; background: var(--success); color: white; text-decoration: none; padding: 12px; border-radius: 12px; text-align: center; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h2>🅿️ Park Hello</h2>
    <p>Lifetime Emergency & Parking Registration</p>
    
    <span class="section-label">Basic Details</span>
    <input type="text" id="ownerName" placeholder="Owner Full Name">
    <input type="text" id="carNum" placeholder="Vehicle Number (e.g. LEC-123)" style="text-transform: uppercase;">
    <input type="tel" id="phone" placeholder="Your WhatsApp Number">

    <span class="section-label">Medical Info (For Emergency)</span>
    <select id="bloodGroup">
        <option value="">Select Blood Group</option>
        <option value="A+">A+</option><option value="A-">A-</option>
        <option value="B+">B+</option><option value="B-">B-</option>
        <option value="AB+">AB+</option><option value="AB-">AB-</option>
        <option value="O+">O+</option><option value="O-">O-</option>
    </select>
    <input type="text" id="history" placeholder="Medical History (Sugar, Heart, etc.)">
    <input type="text" id="meds" placeholder="Current Medications">

    <span class="section-label">Family Contacts</span>
    <input type="tel" id="fam1" placeholder="Emergency Contact 1 (Family)">
    <input type="tel" id="fam2" placeholder="Emergency Contact 2 (Family)">

    <button class="btn-submit" id="regBtn" onclick="registerUser()">Register for Lifetime (Rs. 500)</button>
</div>

<script>
    function registerUser() {
        const data = {
            name: document.getElementById('ownerName').value,
            car: document.getElementById('carNum').value.trim().toUpperCase(),
            phone: document.getElementById('phone').value,
            blood: document.getElementById('bloodGroup').value,
            history: document.getElementById('history').value,
            meds: document.getElementById('meds').value,
            fam1: document.getElementById('fam1').value,
            fam2: document.getElementById('fam2').value
        };

        if(!data.name || !data.car || !data.phone) return alert("Please fill basic details!");

        const btn = document.getElementById('regBtn');
        btn.innerText = "Processing...";
        btn.disabled = true;

        const scriptURL = 'https://script.google.com/macros/s/AKfycbzCfBRCwz0ucFM56xOUyO5R_J-dtigaShZi5Rw3s4R4ZfldQ40qUIFKAJPLwpvTsaVM/exec'; 

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: new URLSearchParams(data)
        })
        .then(() => showSuccess(data.name, data.car))
        .catch(() => { alert("Error!"); btn.disabled = false; btn.innerText = "Register for Lifetime (Rs. 500)"; });
    }

    function showSuccess(name, car) {
        document.getElementById('mainCard').innerHTML = `
            <h2 style="color:#059669;">✅ Request Sent!</h2>
            <p>Thank you <b>${name}</b>. Your details for <b>${car}</b> are recorded.</p>
            <div class="payment-box">
                <h4 style="margin:0;">💳 Pay Rs. 500 (Lifetime)</h4>
                <p style="margin:5px 0; text-align:left;"><b>JazzCash:</b> 03077921584<br><b>EasyPaisa:</b> 03222813027</p>
            </div>
            <a href="https://wa.me/923060157873?text=Hi, I paid 500 for ${car}" class="whatsapp-btn">Send Receipt to 03060157873</a>
        `;
    }
</script>
</body>
</html>
