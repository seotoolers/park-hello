<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Hello Admin - QR Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .admin-card { background: #1e293b; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #334155; border-radius: 10px; background: #0f172a; color: white; box-sizing: border-box; }
        .btn-make { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        #qrcode { margin-top: 25px; padding: 15px; background: white; border-radius: 15px; display: inline-block; }
        #downloadLink { display: none; color: #38bdf8; margin-top: 15px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>🛠️ Admin Panel</h2>
        <p style="color: #94a3b8; font-size: 13px;">Generate QR after Payment</p>
        <input type="text" id="adminName" placeholder="Owner Name">
        <input type="text" id="adminCar" placeholder="Vehicle Number">
        <input type="tel" id="adminPhone" placeholder="Phone Number">
        <button class="btn-make" onclick="adminMakeQR()">Generate Premium QR</button>
        
        <br>
        <div id="qrcode"></div>
        <br>
        <a href="#" id="downloadLink" download="Official-QR.png">📥 Download & Send to WhatsApp</a>
    </div>

    <script>
        function adminMakeQR() {
            const name = document.getElementById('adminName').value;
            const car = document.getElementById('adminCar').value.toUpperCase();
            const phone = document.getElementById('adminPhone').value;

            // یہ وہی لنک بنائے گا جو profile.html کو ڈیٹا دے گا
            const baseUrl = window.location.href.replace('admin.html', 'profile.html');
            const finalUrl = `${baseUrl}?car=${encodeURIComponent(car)}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`;

            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 200, height: 200 });

            setTimeout(() => {
                const img = document.querySelector('#qrcode img');
                if(img) {
                    document.getElementById('downloadLink').href = img.src;
                    document.getElementById('downloadLink').style.display = "block";
                }
            }, 500);
        }
    </script>
</body>
</html>
