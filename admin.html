<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Hello - Secure Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --primary: #1a73e8; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; }
        
        /* Protection Overlay */
        #auth-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 10000; display: flex; 
            justify-content: center; align-items: center; 
        }
        .auth-box { 
            background: var(--card); padding: 30px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 300px; 
        }

        /* Dashboard Styles */
        .container { max-width: 1000px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: none; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .controls { background: var(--bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; align-items: center; }
        select, button, input { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .btn-qr { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 600; }
        
        /* Modal & Sticker */
        #qr-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; text-align: center; width: 320px; color: #000; }
        .sticker-frame { border: 2px solid #eee; padding: 20px; border-radius: 15px; background: #fff; margin-bottom: 15px; }
        .contact-title { font-size: 22px; font-weight: bold; line-height: 1.1; margin-top: 10px; text-transform: uppercase; }
        .pulse-text { color: red; font-size: 9px; font-weight: bold; animation: blink 1s infinite; margin-top: 10px; display: block; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body data-theme="light">

<div id="auth-screen">
    <div class="auth-box">
        <h3 style="color: var(--primary);">Admin Login</h3>
        <input type="password" id="passInput" placeholder="Enter Password" style="width: 80%; margin-bottom: 15px; text-align: center;">
        <br>
        <button onclick="verifyAccess()" style="width: 88%; background: var(--primary); color: white;">Unlock</button>
        <p id="err" style="color: red; font-size: 12px; display: none; margin-top: 10px;">Incorrect Password!</p>
    </div>
</div>

<div class="container" id="admin-panel">
    <div class="header-flex">
        <h2 style="color: var(--primary);">🅿️ Park Hello Admin</h2>
        <div>
            <button onclick="toggleTheme()">🌓 Theme</button>
            <button onclick="logout()" style="background: #ff4757; color: white; border: none; margin-left: 10px;">Logout</button>
        </div>
    </div>

    <div class="controls">
        <label>Sticker Theme:</label>
        <select id="qrColor">
            <option value="#000000">Classic Black</option>
            <option value="#1a73e8" selected>Electric Blue</option>
            <option value="#dc2626">Emergency Red</option>
            <option value="#059669">Safety Green</option>
        </select>
        <button onclick="loadUsers()">🔄 Refresh User List</button>
    </div>

    <table id="userTable">
        <thead>
            <tr>
                <th>Owner</th>
                <th>Vehicle</th>
                <th>Blood</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="qr-modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="position:absolute; top:10px; right:20px; cursor:pointer; font-size:25px;">×</span>
        <div id="printable-sticker" class="sticker-frame">
            <div id="qrcode" style="display: flex; justify-content: center;"></div>
            <div class="contact-title" id="stickerTitle">
                <span>Contact</span><span>Car</span><span>Owner</span>
            </div>
            <div id="sticker-car-num" style="font-weight: bold; font-size: 18px; margin-top: 5px;"></div>
            <span class="pulse-text">ONLY FOR ACCIDENTS / MEDICAL EMERGENCY</span>
            <p style="font-size: 10px; color: #64748b; margin: 5px 0;">Want this? Scan to Register!</p>
            <small style="font-size: 9px; font-weight: bold; color: #25d366;">WhatsApp: 03060157873</small>
        </div>
        <button class="btn-qr" onclick="downloadSticker()" style="width: 100%;">📥 Download PNG</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    // --- SETTINGS ---
    const ADMIN_PASS = "Park786"; // Change your password here
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbuYcjVwk1hogCD00mwOAKlFtz-7QQV8xUyyXZT3dP6AOCQxtVQCo1OWhhyab_PVWo/exec';

    // --- AUTH LOGIC ---
    function verifyAccess() {
        const val = document.getElementById('passInput').value;
        if(val === ADMIN_PASS) {
            sessionStorage.setItem('admin_auth', 'true');
            initDashboard();
        } else {
            document.getElementById('err').style.display = 'block';
        }
    }

    function initDashboard() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        loadUsers();
    }

    function logout() {
        sessionStorage.removeItem('admin_auth');
        window.location.reload();
    }

    // Check if already logged in
    if(sessionStorage.getItem('admin_auth') === 'true') {
        initDashboard();
    }

    // --- DASHBOARD LOGIC ---
    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    async function loadUsers() {
        const body = document.getElementById('tableBody');
        body.innerHTML = "<tr><td colspan='4'>Fetching Data...</td></tr>";
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            body.innerHTML = "";
            data.forEach(u => {
                let row = `<tr>
                    <td>${u.name}</td>
                    <td><b>${u.car}</b></td>
                    <td><span style="color:red; font-weight:bold;">${u.blood || 'N/A'}</span></td>
                    <td><button class="btn-qr" onclick="generateQR('${u.name}','${u.car}','${u.phone}','${u.blood}','${u.rel1}','${u.fam1}','${u.m1}','${u.rel2}','${u.fam2}','${u.m2}')">Create Sticker</button></td>
                </tr>`;
                body.innerHTML += row;
            });
        } catch (e) { body.innerHTML = "Error loading data!"; }
    }

    function generateQR(name, car, phone, blood, rel1, fam1, m1, rel2, fam2, m2) {
        const color = document.getElementById('qrColor').value;
        const folder = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        const url = window.location.origin + folder + "profile.html?" + 
            `car=${encodeURIComponent(car)}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&blood=${encodeURIComponent(blood)}` +
            `&rel1=${encodeURIComponent(rel1)}&fam1=${encodeURIComponent(fam1)}&m1=${encodeURIComponent(m1)}` +
            `&rel2=${encodeURIComponent(rel2)}&fam2=${encodeURIComponent(fam2)}&m2=${encodeURIComponent(m2)}`;

        document.getElementById('qr-modal').style.display = 'flex';
        document.getElementById('sticker-car-num').innerText = car;
        document.getElementById('stickerTitle').style.color = color;
        document.getElementById('qrcode').innerHTML = "";

        new QRCode(document.getElementById("qrcode"), {
            text: url, width: 180, height: 180,
            colorDark: color, colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    }

    function closeModal() { document.getElementById('qr-modal').style.display = 'none'; }

    function downloadSticker() {
        const sticker = document.getElementById('printable-sticker');
        html2canvas(sticker, { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `ParkHello-${document.getElementById('sticker-car-num').innerText}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
