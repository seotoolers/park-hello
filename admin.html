<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Hello - Admin Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1e293b; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #1a73e8; color: white; }
        .btn-qr { background: #059669; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        #qr-display { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border: 2px solid #1a73e8; border-radius: 20px; display: none; text-align: center; box-shadow: 0 0 100px rgba(0,0,0,0.5); }
        .close-qr { margin-top: 15px; color: red; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Registered Users List</h2>
    <p id="loading">Loading data from Google Sheets...</p>
    <table id="userTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Vehicle</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="qr-display">
    <h3 id="qr-title"></h3>
    <div id="qrcode"></div>
    <br>
    <a href="#" id="downloadLink" download="QR.png" style="color: blue; text-decoration: none; font-weight: bold;">📥 Download Image</a>
    <div class="close-qr" onclick="document.getElementById('qr-display').style.display='none'">[ CLOSE ]</div>
</div>

<script>
    // ⚠️ اپنا نیا Google Script URL یہاں ڈالیں
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw3ZgxHD_suMAplDw22LkqYfX-_9kACWwsnmi3Uq2dixqKyGJTJ_NIO9rgrkpKaTqYzig/exec';

    // لسٹ لوڈ کرنے کا فنکشن
    async function loadUsers() {
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            const tableBody = document.getElementById('tableBody');
            document.getElementById('loading').style.display = 'none';

            data.forEach(user => {
                let row = `<tr>
                    <td>${user.name}</td>
                    <td>${user.car}</td>
                    <td>${user.phone}</td>
                    <td><button class="btn-qr" onclick="makeQR('${user.name}', '${user.car}', '${user.phone}')">Make QR</button></td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        } catch (error) {
            alert("Error loading data. Check if URL is correct and Deployment is set to 'Anyone'.");
        }
    }

    function makeQR(name, car, phone) {
        const folderPath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        const profileUrl = window.location.origin + folderPath + "profile.html?car=" + encodeURIComponent(car) + "&name=" + encodeURIComponent(name) + "&phone=" + encodeURIComponent(phone);
        
        document.getElementById('qr-display').style.display = 'block';
        document.getElementById('qr-title').innerText = car;
        document.getElementById('qrcode').innerHTML = "";
        
        new QRCode(document.getElementById("qrcode"), { text: profileUrl, width: 200, height: 200 });

        setTimeout(() => {
            const img = document.querySelector('#qrcode img');
            if(img) document.getElementById('downloadLink').href = img.src;
        }, 500);
    }

    loadUsers();
</script>
</body>
</html>
