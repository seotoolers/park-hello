<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Hello - Vehicle Registration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 40px; margin-bottom: 5px; }
        h2 { color: #0f172a; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        .btn-generate { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; }
        .btn-save { display: none; background: #059669; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; margin-top: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">🅿️</div>
        <h2>Park Hello</h2>
        <p>Vehicle Registration Page</p>
        
        <input type="text" id="ownerName" placeholder="Owner Full Name">
        <input type="text" id="carNum" placeholder="Vehicle Number (e.g. ABC-123)" style="text-transform: uppercase;">
        <input type="tel" id="phone" placeholder="Contact Number">
        
        <button class="btn-generate" onclick="makeQR()">Generate QR Code</button>

        <div id="qrcode"></div>
        <a href="#" class="btn-save" id="downloadBtn" download="MyVehicleQR.png">📥 Save QR Code</a>
    </div>

    <script>
        var qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 200,
            height: 200
        });

        function makeQR() {
            const name = document.getElementById('ownerName').value;
            const car = document.getElementById('carNum').value.trim().toUpperCase();
            const phone = document.getElementById('phone').value;

            if (!name || !car || !phone) {
                alert("Please fill all fields!");
                return;
            }

            // GitHub Pages کے لیے صحیح لنک بنانا
            const currentUrl = window.location.href.split('index.html')[0].split('#')[0];
            const profileUrl = currentUrl + "profile.html?car=" + encodeURIComponent(car) + "&name=" + encodeURIComponent(name) + "&phone=" + encodeURIComponent(phone);

            qrcode.clear(); 
            qrcode.makeCode(profileUrl);

            // ڈاؤن لوڈ بٹن دکھانا
            setTimeout(() => {
                const img = document.querySelector('#qrcode img');
                if (img) {
                    document.getElementById('downloadBtn').href = img.src;
                    document.getElementById('downloadBtn').style.display = "inline-block";
                }
            }, 500);
        }
    </script>
</body>
</html>
