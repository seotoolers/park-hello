<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Support - Park Hello</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --emergency: #dc2626; --parking: #1a73e8; --bg: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
        .card { background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        
        /* Header Info */
        .header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .plate { background: #000; color: #facc15; display: inline-block; padding: 5px 15px; border-radius: 10px; font-weight: bold; font-size: 20px; margin-bottom: 10px; }
        .owner-name { font-weight: 600; color: var(--parking); font-size: 18px; margin: 0; }

        .container { padding: 20px; }
        .section-title { font-size: 12px; font-weight: bold; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; border-left: 3px solid #ddd; padding-left: 10px; }

        /* Parking Issues Grid */
        .issue-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .issue-btn { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 12px 10px; border-radius: 15px; text-decoration: none; color: #475569; font-size: 13px; font-weight: 600; text-align: center; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .issue-btn:active { background: #e2e8f0; transform: scale(0.95); }
        .issue-btn span { font-size: 20px; margin-bottom: 5px; }

        /* Emergency Section */
        .emergency-box { background: #fef2f2; border: 2px solid #fee2e2; border-radius: 20px; padding: 15px; margin-top: 10px; }
        .btn-call { display: flex; align-items: center; justify-content: center; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: 600; margin-top: 10px; font-size: 15px; transition: 0.2s; }
        .btn-call-red { background: var(--emergency); color: white; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2); }
        .btn-call-blue { background: var(--parking); color: white; }
        .btn-call i { margin-right: 10px; }

        .blood-badge { background: var(--emergency); color: white; padding: 2px 10px; border-radius: 5px; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="plate" id="disp-car">CAR-0000</div>
        <p class="owner-name" id="disp-name">Owner Name <span class="blood-badge" id="disp-blood">B+</span></p>
    </div>

    <div class="container">
        <span class="section-title">Parking & Maintenance</span>
        <div class="issue-grid">
            <a href="#" class="issue-btn" onclick="sendWA('Tyre Flat 🛞')"><span>🛞</span> Tyre Flat</a>
            <a href="#" class="issue-btn" onclick="sendWA('Window Open 🪟')"><span>🪟</span> Window Open</a>
            <a href="#" class="issue-btn" onclick="sendWA('Lights On 💡')"><span>💡</span> Lights On</a>
            <a href="#" class="issue-btn" onclick="sendWA('Wrong Parking 🚫')"><span>🚫</span> Wrong Park</a>
            <a href="#" class="issue-btn" onclick="sendWA('Liquid Leaking 💧')"><span>💧</span> Leaking</a>
            <a href="#" class="issue-btn" onclick="sendWA('Baby Crying 👶')"><span>👶</span> Baby Crying</a>
        </div>

        <span class="section-title" style="color: var(--emergency);">Emergency Contacts</span>
        <div class="emergency-box">
            <p style="font-size: 11px; color: #991b1b; margin-top: 0; font-weight: bold;">ONLY FOR ACCIDENTS / MEDICAL EMERGENCY:</p>
            <a href="#" id="call-fam1" class="btn-call btn-call-red">📞 Call Family Member 1</a>
            <a href="#" id="call-fam2" class="btn-call btn-call-red">📞 Call Family Member 2</a>
        </div>

        <div style="margin-top: 20px;">
            <a href="#" id="call-owner" class="btn-call btn-call-blue">🚗 Call Owner Directly</a>
        </div>
    </div>

    <div style="text-align: center; padding: 15px; font-size: 10px; color: #94a3b8; background: #fafafa;">
        Shielded by <b>Park Hello</b> Security
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const phone = params.get('phone') || "";
    const car = params.get('car') || "Vehicle";

    // Fill Data
    document.getElementById('disp-car').innerText = car;
    document.getElementById('disp-name').innerText = params.get('name') || "Valued Member";
    document.getElementById('disp-blood').innerText = params.get('blood') || "N/A";

    // Setup Call Links
    if(phone) document.getElementById('call-owner').href = "tel:" + phone;
    if(params.get('fam1')) document.getElementById('call-fam1').href = "tel:" + params.get('fam1');
    if(params.get('fam2')) document.getElementById('call-fam2').href = "tel:" + params.get('fam2');

    // Send WhatsApp Alert
    function sendWA(issue) {
        if(!phone) return alert("Contact not available");
        const msg = `Hello, I am near your vehicle (${car}). I noticed: ${issue}. Please check.`;
        window.location.href = `https://wa.me/92${phone.startsWith('0') ? phone.slice(1) : phone}?text=${encodeURIComponent(msg)}`;
    }
</script>

</body>
</html>
