<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Profile - Park Hello</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --emergency: #dc2626; --parking: #1a73e8; --bg: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
        
        .card { background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.12); max-width: 450px; margin: auto; }
        
        /* Vehicle Header */
        .header { background: white; padding: 25px 20px; text-align: center; border-bottom: 1px solid #f1f5f9; position: relative; }
        .plate { background: #000; color: #facc15; display: inline-block; padding: 6px 18px; border-radius: 12px; font-weight: bold; font-size: 22px; margin-bottom: 10px; border: 2px solid #333; }
        .owner-info { font-weight: 600; color: var(--parking); font-size: 18px; margin: 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .blood-badge { background: var(--emergency); color: white; padding: 2px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }

        .content { padding: 20px; }
        .section-label { font-size: 11px; font-weight: bold; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: block; border-left: 3px solid #e2e8f0; padding-left: 10px; }

        /* Parking Notifications Grid */
        .issue-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .issue-btn { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 15px 10px; border-radius: 18px; text-decoration: none; color: #475569; font-size: 13px; font-weight: 600; text-align: center; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .issue-btn:active { background: #e2e8f0; transform: scale(0.96); }
        .issue-btn span { font-size: 22px; }

        /* Pulse Blinking Text */
        .pulse-box { text-align: center; margin-bottom: 10px; }
        .pulse-text { 
            color: var(--emergency); 
            font-size: 12px; 
            font-weight: bold; 
            animation: pulse-animation 1s infinite; 
            display: inline-block;
        }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* Emergency Section */
        .emergency-area { background: #fff5f5; border: 2px solid #fee2e2; border-radius: 22px; padding: 18px; }
        .btn-action { display: flex; align-items: center; justify-content: center; text-decoration: none; padding: 16px; border-radius: 15px; font-weight: 600; margin-top: 10px; font-size: 16px; transition: 0.2s; color: white; border: none; width: 100%; cursor: pointer; }
        .btn-sos { background: var(--emergency); box-shadow: 0 6px 15px rgba(220, 38, 38, 0.25); }
        .btn-parking { background: var(--parking); margin-top: 20px; }
        .btn-action:active { transform: scale(0.97); }

        .footer-note { text-align: center; padding: 20px; font-size: 11px; color: #94a3b8; background: #fafafa; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="plate" id="disp-car">LEC-0000</div>
        <div class="owner-info">
            <span id="disp-name">Loading Owner...</span>
            <span class="blood-badge" id="disp-blood">N/A</span>
        </div>
    </div>

    <div class="content">
        <span class="section-label">Parking Issues</span>
        <div class="issue-grid">
            <a href="#" class="issue-btn" onclick="sendParkingWA('Tyre Flat 🛞')"><span>🛞</span> Tyre Flat</a>
            <a href="#" class="issue-btn" onclick="sendParkingWA('Window Open 🪟')"><span>🪟</span> Window Open</a>
            <a href="#" class="issue-btn" onclick="sendParkingWA('Lights On 💡')"><span>💡</span> Lights On</a>
            <a href="#" class="issue-btn" onclick="sendParkingWA('Wrong Parking 🚫')"><span>🚫</span> Wrong Park</a>
            <a href="#" class="issue-btn" onclick="sendParkingWA('Leaking Liquid 💧')"><span>💧</span> Leaking</a>
            <a href="#" class="issue-btn" onclick="sendParkingWA('Baby Crying 👶')"><span>👶</span> Baby Crying</a>
        </div>

        <div class="pulse-box">
            <span class="pulse-text">🆘 ONLY FOR ACCIDENTS / MEDICAL EMERGENCY</span>
        </div>
        
        <div class="emergency-area">
            <a href="#" id="btn-fam1" class="btn-action btn-sos">
                <span id="icon1">📞</span>&nbsp;Call <span id="txt-rel1">Family 1</span>
            </a>
            
            <a href="#" id="btn-fam2" class="btn-action btn-sos">
                <span id="icon2">📞</span>&nbsp;Call <span id="txt-rel2">Family 2</span>
            </a>
        </div>

        <a href="#" id="btn-owner" class="btn-action btn-parking">
            🚗 Call Owner (Parking)
        </a>
    </div>

    <div class="footer-note">
        🛡️ Protected by <b>Park Hello</b> Security System
    </div>
</div>

<script>
    // Get Data from URL
    const urlParams = new URLSearchParams(window.location.search);
    const ownerPhone = urlParams.get('phone');
    const vehicleNo = urlParams.get('car') || "Vehicle";

    // Fill Display Fields
    document.getElementById('disp-car').innerText = vehicleNo;
    document.getElementById('disp-name').innerText = urlParams.get('name') || "Valued Owner";
    document.getElementById('disp-blood').innerText = urlParams.get('blood') || "N/A";

    // Setup Owner Phone
    if(ownerPhone) document.getElementById('btn-owner').href = "tel:" + ownerPhone;

    // Smart Emergency Button Configurator
    function configureEmergencyBtn(btnId, relTxtId, relKey, numKey, methodKey, iconId) {
        const btn = document.getElementById(btnId);
        const relation = urlParams.get(relKey) || "Relative";
        const number = urlParams.get(numKey);
        const method = urlParams.get(methodKey); // 'tel' or 'wa'

        if(number) {
            document.getElementById(relTxtId).innerText = relation;
            
            if(method === 'wa') {
                document.getElementById(iconId).innerText = "💬";
                btn.innerText = " Message " + relation;
                btn.href = `https://wa.me/${number}?text=Emergency! This is regarding your family member's vehicle ${vehicleNo}. Please respond.`;
            } else {
                // Direct Telephony (Dialer)
                btn.href = "tel:" + number;
            }
        } else {
            btn.style.display = 'none'; // Hide if no number
        }
    }

    // Run Configuration
    configureEmergencyBtn('btn-fam1', 'txt-rel1', 'rel1', 'fam1', 'm1', 'icon1');
    configureEmergencyBtn('btn-fam2', 'txt-rel2', 'rel2', 'fam2', 'm2', 'icon2');

    // Parking WhatsApp Function
    function sendParkingWA(issue) {
        if(!ownerPhone) {
            alert("Owner contact not available.");
            return;
        }
        const waLink = `https://wa.me/92${ownerPhone.startsWith('0') ? ownerPhone.slice(1) : ownerPhone}?text=Hello, I am near your vehicle ${vehicleNo}. I noticed: ${issue}. Please check.`;
        window.location.href = waLink;
    }
</script>

</body>
</html>
