<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Owner Profile - Park Hello</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --safety: #dc2626; }
        body { font-family: 'Poppins', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .profile-card { background: white; width: 100%; max-width: 350px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; text-align: center; }
        .header { background: var(--primary); color: white; padding: 30px 20px; }
        .car-icon { font-size: 50px; margin-bottom: 10px; }
        .plate-number { background: #000; color: #facc15; display: inline-block; padding: 5px 15px; border-radius: 8px; font-weight: bold; letter-spacing: 1px; border: 2px solid #333; margin-top: 10px; }
        .details { padding: 30px 20px; }
        .owner-name { font-size: 20px; font-weight: 600; color: #1e293b; margin: 0; }
        .status { color: #059669; font-size: 13px; font-weight: 600; margin-bottom: 20px; display: block; }
        
        /* Contact Button */
        .btn-call { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: var(--safety); 
            color: white; 
            text-decoration: none; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: 600; 
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }
        .btn-call:hover { transform: scale(1.02); background: #b91c1c; }
        .btn-call span { margin-left: 10px; }
        
        .footer { padding-bottom: 25px; color: #94a3b8; font-size: 11px; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="header">
            <div class="car-icon">🚗</div>
            <div class="plate-number" id="disp-car">LOADING...</div>
        </div>

        <div class="details">
            <span class="status">● Verified Park Hello Member</span>
            <h2 class="owner-name" id="disp-name">Vehicle Owner</h2>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">If this vehicle is causing an issue, please contact the owner below.</p>
            
            <a href="#" id="call-link" class="btn-call">
                📞 <span>Contact Car Owner</span>
            </a>
        </div>

        <div class="footer">
            Powered by <b>Park Hello</b> Security System
        </div>
    </div>

    <script>
        // URL سے ڈیٹا نکالنے کا فنکشن
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || "Valued Member";
        const car = params.get('car') || "N/A";
        const phone = params.get('phone') || "";

        // پیج پر ڈیٹا دکھانا
        document.getElementById('disp-name').innerText = name;
        document.getElementById('disp-car').innerText = car;
        
        // کال والے بٹن میں نمبر ڈالنا
        if(phone) {
            document.getElementById('call-link').href = "tel:" + phone;
        } else {
            document.getElementById('call-link').style.display = "none";
        }
    </script>
</body>
</html>
