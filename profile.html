<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Hello - Vehicle Profile</title>
    <style>
        /* Premium Gradient Background */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #ff416c, #ff4b2b); color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* Modern Card Design */
        .profile-card { background: white; padding: 30px; border-radius: 25px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.25); width: 100%; max-width: 400px; }
        
        .brand-name { color: #ff4b2b; font-weight: bold; font-size: 22px; margin-bottom: 15px; display: block; }
        .icon { font-size: 60px; margin-bottom: 10px; }
        
        p.label { margin: 0; color: #777; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        h1 { margin: 5px 0 15px 0; color: #1a1a1a; font-size: 32px; font-weight: 800; }
        
        .status { display: inline-block; background: #28a745; color: white; padding: 6px 18px; border-radius: 50px; font-size: 14px; font-weight: bold; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.2); }

        /* Action Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .btn { padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; transition: 0.3s; }
        .btn-call { background: #007bff; }
        .btn-wa { background: #25D366; }
        .btn-loc { background: #6f42c1; width: 100%; margin-bottom: 25px; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Alert Options */
        .alerts-section { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 15px; border: 1px solid #eee; }
        .alerts-section h4 { margin: 0 0 10px 5px; font-size: 13px; color: #ff4b2b; }
        .msg-option { background: white; border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; font-size: 13px; color: #444; width: 100%; text-align: left; transition: 0.2s; }
        .msg-option:hover { border-color: #ff4b2b; background: #fff5f5; }

        .scan-info { margin-top: 20px; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <div class="profile-card">
        <span class="brand-name">Park Hello 👋</span>
        <div class="icon">🚘</div>
        
        <p class="label">Vehicle Number</p>
        <h1 id="displayNum">Loading...</h1>
        
        <div class="status">Verified Owner ✅</div>

        <div class="btn-grid">
            <a href="#" id="callBtn" class="btn btn-call">📞 Call</a>
            <a href="#" id="waBtn" class="btn btn-wa">💬 WhatsApp</a>
        </div>
        
        <button class="btn btn-loc" onclick="sendLoc()">📍 Send My Location</button>

        <div class="alerts-section">
            <h4>Quick Emergency Alerts:</h4>
            <button class="msg-option" onclick="alertOwner('غلط پارکنگ کی وجہ سے راستہ بند ہے، مہربانی فرما کر گاڑی ہٹا لیں۔')">🚫 Path Blocked / Wrong Parking</button>
            <button class="msg-option" onclick="alertOwner('آپ کی گاڑی کی لائٹس آن رہ گئی ہیں۔')">💡 Lights are ON</button>
            <button class="msg-option" onclick="alertOwner('آپ کی گاڑی کا ٹائر پنکچر لگ رہا ہے۔')">🔧 Flat Tyre</button>
            <button class="msg-option" onclick="alertOwner('آپ کی گاڑی کا الارم بج رہا ہے۔')">🔔 Alarm Ringing</button>
        </div>

        <p class="scan-info">Scan date: <span id="date"></span><br>Powered by <b>Park Hello</b></p>
    </div>

    <script>
        // ڈیٹا حاصل کرنا
        const params = new URLSearchParams(window.location.search);
        const car = params.get('car') || "Unknown";
        const phone = params.get('phone') || ""; // فون نمبر index.html سے آئے گا
        
        document.getElementById('displayNum').innerText = car.toUpperCase();
        document.getElementById('date').innerText = new Date().toLocaleDateString('en-GB');

        // کال اور واٹس ایپ لنکس
        document.getElementById('callBtn').href = `tel:${phone}`;
        document.getElementById('waBtn').href = `https://wa.me/${phone}?text=${encodeURIComponent('Hello Park Hello! I am near your vehicle ' + car)}`;

        function alertOwner(msg) {
            const finalMsg = encodeURIComponent(`*Park Hello Alert!* 🚗\nVehicle: ${car}\n\n${msg}`);
            window.location.href = `https://wa.me/${phone}?text=${finalMsg}`;
        }

        function sendLoc() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    const locMsg = encodeURIComponent(`*Park Hello Location* 📍\nمیں آپ کی گاڑی (${car}) کے پاس یہاں موجود ہوں:\n${link}`);
                    window.location.href = `https://wa.me/${phone}?text=${locMsg}`;
                }, () => alert("Please allow location access."));
            }
        }
    </script>
</body>
</html>
