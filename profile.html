<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Profile - Park Hello</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --emergency: #dc2626; --info: #1a73e8; --success: #059669; }
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; margin: 0; padding: 15px; }
        .card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.15); max-width: 400px; margin: auto; }
        .emergency-header { background: var(--emergency); color: white; padding: 25px 20px; text-align: center; }
        .blood-tag { background: white; color: var(--emergency); padding: 8px 20px; border-radius: 12px; font-weight: bold; font-size: 22px; margin-top: 10px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .section { padding: 20px; border-bottom: 1px solid #f1f5f9; }
        .label { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 17px; color: #1e293b; font-weight: 600; margin-top: 2px; }
        .med-box { background: #fff5f5; border: 1px dashed var(--emergency); border-radius: 12px; padding: 12px; margin-top: 10px; }
        .btn { display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; padding: 16px; border-radius: 15px; font-weight: 600; margin-top: 10px; font-size: 16px; transition: 0.2s; }
        .btn-call-emergency { background: var(--emergency); box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3); }
        .btn-call-owner { background: var(--info); }
        .btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="card">
    <div class="emergency-header">
        <div style="font-size: 40px;">🆘</div>
        <h2 style="margin:0; letter-spacing: 1px;">EMERGENCY DATA</h2>
        <div class="blood-tag" id="blood">B+</div>
    </div>

    <div class="section">
        <div class="label">Vehicle & Owner</div>
        <div class="val" id="car">LEC-0000</div>
        <div class="val" style="color: var(--info);" id="name">Name Loading...</div>
    </div>

    <div class="section">
        <div class="label">Medical History & Meds</div>
        <div class="med-box">
            <div class="val" style="font-size: 15px; color: var(--emergency);" id="history">History: Loading...</div>
            <div style="font-size: 13px; color: #475569; margin-top: 5px;" id="meds">Meds: Loading...</div>
        </div>
    </div>

    <div class="section">
        <div class="label">Emergency Actions</div>
        <a href="#" id="call1" class="btn btn-call-emergency">📞 Call Family Contact 1</a>
        <a href="#" id="call2" class="btn btn-call-emergency">📞 Call Family Contact 2</a>
        <a href="#" id="callOwner" class="btn btn-call-owner">🚗 Contact Owner (Parking)</a>
    </div>

    <div style="padding: 20px; text-align: center; background: #fafafa; font-size: 11px; color: #94a3b8;">
        🛡️ Protected by <b>Park Hello</b> Security System
    </div>
</div>

<script>
    const url = new URLSearchParams(window.location.search);
    
    // ڈیٹا فل کرنا
    document.getElementById('name').innerText = url.get('name') || "Unknown Owner";
    document.getElementById('car').innerText = url.get('car') || "No Plate";
    document.getElementById('blood').innerText = url.get('blood') || "N/A";
    document.getElementById('history').innerText = "History: " + (url.get('history') || "None");
    document.getElementById('meds').innerText = "Medications: " + (url.get('meds') || "None");

    // کال لنکس سیٹ کرنا
    if(url.get('phone')) document.getElementById('callOwner').href = "tel:" + url.get('phone');
    if(url.get('fam1')) document.getElementById('call1').href = "tel:" + url.get('fam1');
    if(url.get('fam2')) document.getElementById('call2').href = "tel:" + url.get('fam2');
</script>

</body>
</html>
